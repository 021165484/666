<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft VS Roblox</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#7ec8ff;
font-family:Arial,sans-serif;
}

canvas{
display:block;
}

#win{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
font-weight:bold;
color:white;
text-shadow:
0 0 10px #fff,
0 0 30px gold,
0 0 60px orange;
display:none;
z-index:100;
}
</style>
</head>
<body>

<div id="win">MINECRAFT WINS!</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const mcImg=new Image();
mcImg.src="minecraft.png";

const rbImg=new Image();
rbImg.src="roblox.png";

const maceImg=new Image();
maceImg.src="mace.png";

const gunImg=new Image();
gunImg.src="gun.png";

const totemImg=new Image();
totemImg.src="totem.png";

const swordImg=new Image();
swordImg.src="sword.png";

let cameraShake=0;

function shake(power){
cameraShake=power;
}

const particles=[];

function createExplosion(x,y){

for(let i=0;i<120;i++){

particles.push({
x,
y,
vx:(Math.random()-0.5)*15,
vy:(Math.random()-0.5)*15,
size:Math.random()*8+4,
life:100
});

}

}

const mc={
x:-300,
y:250,
size:220,
alpha:1
};

const rb={
x:0,
y:250,
size:220,
alpha:1
};

let stage=0;
let timer=0;

function update(){

timer++;

if(stage===0){

mc.x+=5;

if(mc.x>100){
stage++;
timer=0;
}

}

else if(stage===1){

mc.y-=2;

if(timer>120){
stage++;
timer=0;
}

}

else if(stage===2){

if(timer>20){
stage++;
timer=0;
}

}

else if(stage===3){

mc.x+=8;

if(mc.x>canvas.width-500){

shake(20);

rb.x+=80;

stage++;
timer=0;

}

}

else if(stage===4){

if(timer>60){
stage++;
timer=0;
}

}

else if(stage===5){

if(timer>90){
stage++;
timer=0;
}

}

else if(stage===6){

mc.alpha=0.2;

if(timer>70){
stage++;
timer=0;
}

}

else if(stage===7){

mc.alpha=1;

if(timer>100){
stage++;
timer=0;
}

}

else if(stage===8){

mc.x+=20;

if(mc.x>canvas.width-300){

createExplosion(
rb.x+100,
rb.y+100
);

rb.alpha=0;

stage++;
timer=0;

}

}

else if(stage===9){

document.getElementById("win").style.display="block";

if(timer>180){

window.location.href="home.html";

}

}

particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

});

}

function drawBackground(){

ctx.fillStyle="#7ec8ff";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#4caf50";
ctx.fillRect(
0,
canvas.height-180,
canvas.width,
180
);

ctx.fillStyle="#7a4d28";
ctx.fillRect(
0,
canvas.height-120,
canvas.width,
120
);

}

function draw(){

requestAnimationFrame(draw);

update();

let sx=0;
let sy=0;

if(cameraShake>0){

sx=(Math.random()-0.5)*cameraShake;
sy=(Math.random()-0.5)*cameraShake;

cameraShake*=0.9;

}

ctx.save();
ctx.translate(sx,sy);

drawBackground();

rb.x=canvas.width-350;

ctx.globalAlpha=rb.alpha;

ctx.drawImage(
rbImg,
rb.x,
rb.y,
rb.size,
rb.size
);

ctx.globalAlpha=1;

ctx.globalAlpha=mc.alpha;

ctx.drawImage(
mcImg,
mc.x,
mc.y,
mc.size,
mc.size
);

ctx.globalAlpha=1;

if(stage>=2){

ctx.save();

ctx.translate(
mc.x+180,
mc.y+50
);

ctx.rotate(timer*0.3);

ctx.drawImage(
maceImg,
-60,
-60,
120,
120
);

ctx.restore();

}

if(stage>=5){

ctx.drawImage(
gunImg,
rb.x-100,
rb.y+30,
120,
120
);

ctx.fillStyle="cyan";

ctx.fillRect(
mc.x+100,
mc.y+100,
rb.x-mc.x,
8
);

}

if(stage===7){

ctx.drawImage(
totemImg,
mc.x+40,
mc.y-120,
120,
120
);

}

if(stage>=8){

ctx.drawImage(
swordImg,
mc.x+100,
mc.y+50,
120,
120
);

}

particles.forEach(p=>{

ctx.globalAlpha=p.life/100;

ctx.fillStyle="orange";

ctx.beginPath();
ctx.arc(
p.x,
p.y,
p.size,
0,
Math.PI*2
);
ctx.fill();

});

ctx.globalAlpha=1;

ctx.restore();

}

draw();

</script>

</body>
</html>
